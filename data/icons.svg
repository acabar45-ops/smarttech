<!--
  SMARTECH Applications Icon Sprite
  ----------------------------------
  Style:  Feather/Lucide-inspired line-art, 1.5px stroke, currentColor.
  Grid:   36x36 viewBox, 2px padding inset (working area 4..32).
  Usage:  Inline this sheet once in the document (e.g., end of <body>),
          then reference icons via <use>:

          <svg class="app-icon" aria-hidden="true"><use href="#icon-gas-cylinder"/></svg>

  All symbols inherit color from the parent element (currentColor).
  Icons are decorative, hence aria-hidden on the parent wrapper.
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <defs>

    <!-- 1. Gas cylinder: tall tank, valve neck + handwheel on top -->
    <symbol id="icon-gas-cylinder" viewBox="0 0 36 36">
      <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 10 H22 V30 a2 2 0 0 1 -2 2 H16 a2 2 0 0 1 -2 -2 Z"/>
        <path d="M17 10 V7 h2 V10"/>
        <line x1="15" y1="7" x2="21" y2="7"/>
        <line x1="14" y1="14" x2="22" y2="14"/>
        <line x1="14" y1="27" x2="22" y2="27"/>
      </g>
    </symbol>

    <!-- 2. Insulated pipe: horizontal pipe with two cladding rings -->
    <symbol id="icon-insulated-pipe" viewBox="0 0 36 36">
      <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="14" width="28" height="8" rx="1"/>
        <line x1="13" y1="14" x2="13" y2="22"/>
        <line x1="23" y1="14" x2="23" y2="22"/>
        <line x1="4" y1="18" x2="8" y2="18"/>
        <line x1="28" y1="18" x2="32" y2="18"/>
      </g>
    </symbol>

    <!-- 3. Battery cell: vertical rectangle with + terminal cap -->
    <symbol id="icon-battery-cell" viewBox="0 0 36 36">
      <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="12" y="8" width="12" height="24" rx="1.5"/>
        <rect x="15" y="5" width="6" height="3" rx="0.5"/>
        <line x1="18" y1="13" x2="18" y2="19"/>
        <line x1="15" y1="16" x2="21" y2="16"/>
      </g>
    </symbol>

    <!-- 4. Furnace: enclosed chamber, door frame, flame inside -->
    <symbol id="icon-furnace" viewBox="0 0 36 36">
      <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="6" width="26" height="24" rx="2"/>
        <rect x="9" y="10" width="18" height="16" rx="1"/>
        <path d="M18 14 c2 2 3 3.5 3 5 a3 3 0 0 1 -6 0 c0 -1.5 1.5 -2.5 3 -5 Z"/>
      </g>
    </symbol>

    <!-- 5. Oven: rectangular appliance with door, handle, control line -->
    <symbol id="icon-oven" viewBox="0 0 36 36">
      <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="5" width="26" height="26" rx="2"/>
        <line x1="5" y1="11" x2="31" y2="11"/>
        <line x1="9" y1="8" x2="13" y2="8"/>
        <circle cx="27" cy="8" r="0.8"/>
        <rect x="9" y="15" width="18" height="12" rx="1"/>
        <line x1="12" y1="21" x2="24" y2="21"/>
      </g>
    </symbol>

    <!-- 6. OLED display: flat monitor with pixel grid + stand -->
    <symbol id="icon-oled-display" viewBox="0 0 36 36">
      <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="7" width="28" height="18" rx="2"/>
        <line x1="14" y1="29" x2="22" y2="29"/>
        <line x1="18" y1="25" x2="18" y2="29"/>
        <circle cx="12" cy="13" r="0.9"/>
        <circle cx="18" cy="13" r="0.9"/>
        <circle cx="24" cy="13" r="0.9"/>
        <circle cx="12" cy="19" r="0.9"/>
        <circle cx="18" cy="19" r="0.9"/>
        <circle cx="24" cy="19" r="0.9"/>
      </g>
    </symbol>

    <!-- 7. Freeze-dry: capsule/ampoule with snowflake accent -->
    <symbol id="icon-freeze-dry" viewBox="0 0 36 36">
      <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 6 h10 v6 a5 5 0 0 1 -5 5 a5 5 0 0 0 -5 5 v8 h10 v-8"/>
        <line x1="11" y1="6" x2="25" y2="6"/>
        <line x1="11" y1="30" x2="25" y2="30"/>
        <line x1="26" y1="10" x2="32" y2="10"/>
        <line x1="29" y1="7" x2="29" y2="13"/>
        <line x1="27" y1="8" x2="31" y2="12"/>
        <line x1="31" y1="8" x2="27" y2="12"/>
      </g>
    </symbol>

    <!-- 8. Smartphone: vertical handset, screen, camera dot, speaker -->
    <symbol id="icon-smartphone" viewBox="0 0 36 36">
      <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="10" y="4" width="16" height="28" rx="2.5"/>
        <line x1="15" y1="7" x2="19" y2="7"/>
        <circle cx="22" cy="7" r="0.8"/>
        <circle cx="18" cy="28" r="1.2"/>
      </g>
    </symbol>

    <!-- 9. Microscope: base, arm, eyepiece tube, objective, stage -->
    <symbol id="icon-microscope" viewBox="0 0 36 36">
      <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 5 h6 v4 h-6 z"/>
        <line x1="19" y1="9" x2="19" y2="14"/>
        <path d="M15 14 h8 v5 a4 4 0 0 1 -4 4 a4 4 0 0 1 -4 -4 z"/>
        <path d="M11 23 h16"/>
        <path d="M8 31 h20"/>
        <path d="M13 31 c0 -3 2 -5 6 -5 c4 0 6 2 6 5"/>
      </g>
    </symbol>

  </defs>
</svg>
